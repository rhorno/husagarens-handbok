<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Husägarens handbok</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E">
<script>
  // Apply a persisted manual theme choice before first paint, to avoid a flash
  // of the wrong theme. Falls back silently if localStorage is unavailable
  // (e.g. some file:// / privacy configurations).
  (function () {
    try {
      var saved = localStorage.getItem('handbok-theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#content">Hoppa till innehållet</a>

<header class="site-header">
  <div class="header-inner">
    <button id="sidebar-toggle" class="icon-btn sidebar-toggle" type="button"
            aria-label="Visa eller dölj kategorier" aria-expanded="false" aria-controls="sidebar">
      <span class="hamburger" aria-hidden="true"><span></span><span></span><span></span></span>
    </button>

    <a href="#/" class="brand">Husägarens <span>handbok</span></a>

    <div class="search-wrap" role="search">
      <label for="search-input" class="visually-hidden">Sök i handboken</label>
      <svg class="search-icon" aria-hidden="true" viewBox="0 0 20 20" width="16" height="16">
        <circle cx="8.5" cy="8.5" r="6" fill="none" stroke="currentColor" stroke-width="1.6"></circle>
        <line x1="13.2" y1="13.2" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line>
      </svg>
      <input id="search-input" type="search" autocomplete="off" spellcheck="false"
             placeholder="Sök i handboken…  ( / )"
             role="combobox" aria-expanded="false" aria-controls="search-results" aria-autocomplete="list">
      <ul id="search-results" class="search-results" role="listbox" aria-label="Sökresultat" hidden></ul>
    </div>

    <button id="theme-toggle" class="icon-btn" type="button" aria-label="Växla mellan ljust och mörkt tema">
      <span id="theme-icon" aria-hidden="true">🌙</span>
    </button>
  </div>
</header>

<div id="backdrop" class="backdrop" hidden></div>

<div class="app-layout" id="app-layout">
  <nav class="sidebar" id="sidebar" aria-label="Kategorier"></nav>
  <main class="content" id="content" tabindex="-1"></main>
  <aside class="toc" id="toc" aria-label="På sidan" hidden></aside>
</div>

<script src="data.js"></script>
<script src="search.js"></script>
<script src="app.js"></script>
</body>
</html>
